description: "对话压缩 Prompt —— 用于 ShortTermMemory 和 DialogueState 的 LLM 摘要生成"
versions:
  - version: "v1"
    created: "2026-06-29"
    author: "system"
    description: "初始外置版本（与原始硬编码完全一致）"
    prompts:
      conversation_compression: |
        请将以下客服对话压缩为精炼摘要。

        压缩要求：
        1. 保留：用户的真实意图、已确认的决策、未解决的问题、关键信息（订单号/金额等）
        2. 丢弃：寒暄、重复提问、已解决的子问题、工具调用的技术细节
        3. 格式：一段话，不超过 300 字

        对话记录：
        {conversation_log}

        压缩摘要：
      dialogue_compression: |
        请将以下客服对话压缩为精炼摘要。


name: LLM Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max test cases to run'
        default: '8'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llm-workflow:
    name: LLM Workflow Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.actor != 'dependabot[bot]'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agent_cs
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: 1
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: deepseek/deepseek-v4-flash
      LLM_BASE_URL: https://api.deepseek.com/v1
      LLM_TEMPERATURE: 0.1
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: agent_cs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_HOST: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg-binary

      - name: Run LLM workflow tests (script)
        timeout-minutes: 15
        run: |
          python tests/llm_workflow_test.py

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-test-results
          path: tests/workflow_test_results.json

name: LLM Tests

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max test cases to run'
        default: '8'
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  llm-workflow:
    name: LLM Workflow Tests
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.actor != 'dependabot[bot]'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: agent_cs
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      PYTHONUNBUFFERED: 1
      PYTHONIOENCODING: utf-8
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_MODEL: deepseek/deepseek-v4-flash
      LLM_BASE_URL: https://api.deepseek.com/v1
      LLM_TEMPERATURE: 0.1
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: agent_cs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QDRANT_HOST: ""

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install psycopg-binary

      - name: Diagnose environment
        run: |
          echo "=== Python version ==="
          python --version
          echo "=== LLM_API_KEY ==="
          if [ -n "$LLM_API_KEY" ]; then
            echo "set (length=${#LLM_API_KEY}, prefix=${LLM_API_KEY:0:8}...)"
          else
            echo "NOT SET — add LLM_API_KEY in GitHub Secrets"
          fi
          echo "=== DeepSeek API test ==="
          curl -s -w "\nHTTP %{http_code}" --connect-timeout 10 \
            -H "Authorization: Bearer $LLM_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"deepseek-chat","messages":[{"role":"user","content":"hi"}],"max_tokens":10}' \
            https://api.deepseek.com/v1/chat/completions | tail -5
          echo ""
          echo "=== PostgreSQL ==="
          python -c "import psycopg; print('psycopg OK:', psycopg.__version__)" || echo "psycopg FAIL"
          echo "=== Packages ==="
          pip list 2>/dev/null | grep -E "langgraph|litellm|deepseek|psycopg"

      - name: Run LLM workflow tests (script)
        timeout-minutes: 15
        run: |
          python tests/llm_workflow_test.py 2>&1 | tee tests/llm_test_log.txt
          echo "EXIT_CODE=$?" >> "$GITHUB_ENV"

      - name: Upload full test log
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: llm-test-results
          path: |
            tests/workflow_test_results.json
            tests/llm_test_log.txt

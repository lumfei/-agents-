<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多 Agent 客服分流系统</title>
<style>
  :root {
    --primary: #4A90D9;
    --primary-light: #e8f0fe;
    --success: #1e8e3e;
    --warning: #e67e22;
    --danger: #d93025;
    --bg: #f5f6fa;
    --card-bg: #fff;
    --text: #333;
    --text-muted: #999;
    --border: #e0e0e0;
    --radius: 10px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--bg); height: 100vh; display: flex; flex-direction: column;
    color: var(--text);
  }

  /* 顶部栏 */
  .header {
    background: var(--card-bg); border-bottom: 1px solid var(--border);
    padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;
    flex-shrink: 0; z-index: 10;
  }
  .header h1 { font-size: 16px; font-weight: 600; }
  .header .subtitle { font-size: 11px; color: var(--text-muted); }
  .header-right { display: flex; gap: 14px; align-items: center; }
  .badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .badge-ready { background: #e6f4ea; color: var(--success); }
  .badge-busy  { background: #fef3e0; color: var(--warning); }
  .stream-toggle { font-size: 13px; color: #666; display: flex; align-items: center; gap: 4px; cursor: pointer; }
  .tech-badge { background: #f0f0f0; color: #666; border-radius: 4px; padding: 2px 8px;
                font-size: 10px; font-family: monospace; }

  /* 两栏布局 */
  .main {
    flex: 1; display: grid;
    grid-template-columns: 1fr 340px;
    overflow: hidden;
  }
  @media (max-width: 768px) {
    .main { grid-template-columns: 1fr; }
    .trace-panel { display: none; }
  }

  /* 左侧对话区 */
  .chat-area { display: flex; flex-direction: column; overflow: hidden; }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px;
  }
  .msg { display: flex; gap: 10px; max-width: 85%; animation: fadeInUp 0.3s ease-out; }
  @keyframes fadeInUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.agent { align-self: flex-start; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; flex-shrink: 0;
  }
  .msg.user .avatar { background: var(--primary); color: #fff; }
  .msg.agent .avatar { background: var(--primary-light); color: var(--primary); }
  .bubble {
    padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.65;
    word-break: break-word; white-space: pre-wrap;
  }
  .msg.user .bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
  .msg.agent .bubble {
    background: var(--card-bg); color: var(--text); border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .stream-cursor {
    display: inline-block; width: 8px; height: 14px; background: var(--primary);
    animation: blink 1s infinite; vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

  .intent-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    margin-right: 6px; font-weight: 500;
  }
  .intent-tech  { background: #e3f2fd; color: #1565c0; }
  .intent-finance { background: #fef3e0; color: #e65100; }
  .intent-aftersale { background: #f3e5f5; color: #7b1fa2; }

  /* 情感标签样式 */
  .sentiment-tag {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px;
    margin-right: 6px; font-weight: 500;
  }
  .sentiment-positive   { background: #e6f4ea; color: #1e8e3e; }
  .sentiment-neutral    { background: #f0f0f0; color: #888; }
  .sentiment-anxious    { background: #fef3e0; color: #e65100; }
  .sentiment-angry      { background: #fce8e6; color: #c5221f; }
  .sentiment-frustrated { background: #f3e5f5; color: #7b1fa2; }

  .empty-state { text-align: center; color: var(--text-muted); padding: 80px 20px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .hints { font-size: 12px; color: #bbb; margin-top: 8px; }
  .hint-chip {
    display: inline-block; padding: 4px 12px; background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; font-size: 12px; color: #666; margin: 3px; cursor: pointer;
    transition: all 0.15s;
  }
  .hint-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  /* 右侧 Agent 执行追踪面板 */
  .trace-panel {
    background: var(--card-bg); border-left: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .trace-header {
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px;
  }
  .trace-list { flex: 1; overflow-y: auto; padding: 12px; }
  .trace-node {
    padding: 10px 12px; border-radius: 8px; margin-bottom: 6px;
    background: #fafafa; border-left: 3px solid transparent;
    transition: all 0.3s;
  }
  .trace-node.active {
    background: var(--primary-light); border-left-color: var(--primary);
  }
  .trace-node.done {
    border-left-color: var(--success); background: #f9faf9;
  }
  .trace-node-header {
    display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500;
  }
  .trace-icon { font-size: 18px; width: 24px; text-align: center; }
  .trace-status { margin-left: auto; font-size: 11px; font-weight: 500; }
  .trace-status.running { color: var(--primary); }
  .trace-status.done { color: var(--success); }
  .trace-detail { font-size: 12px; color: #666; margin-top: 6px; padding-left: 32px; }
  .trace-detail .tool-call {
    background: #f0f0f0; border-radius: 4px; padding: 4px 8px; margin: 3px 0;
    font-family: monospace; font-size: 11px;
  }
  .trace-detail .tool-name { color: var(--primary); font-weight: 500; }
  .trace-detail .tool-args { color: #888; }
  .trace-detail .tool-result {
    color: var(--success); font-size: 11px;
    display: block; margin-top: 2px; padding: 2px 6px;
    background: #f6fdf6; border-radius: 3px;
  }
  .trace-detail .score { font-weight: 600; }
  .trace-detail .score.pass { color: var(--success); }
  .trace-detail .score.fail { color: var(--danger); }

  /* 输入栏 */
  .input-bar {
    background: var(--card-bg); border-top: 1px solid var(--border);
    padding: 14px 20px; display: flex; gap: 10px; flex-shrink: 0;
  }
  .input-bar input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  .input-bar input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74,144,217,0.1); }
  .input-bar button {
    padding: 10px 22px; background: var(--primary); color: #fff; border: none;
    border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
    transition: opacity 0.2s;
  }
  .input-bar button:hover { opacity: 0.85; }
  .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* CSAT 满意度评分 */
  .csat-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.35); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.25s ease-out;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .csat-card {
    background: var(--card-bg); border-radius: 16px; padding: 28px 32px 24px;
    max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    text-align: center; animation: slideUp 0.3s ease-out;
  }
  @keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
  .csat-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .csat-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }
  .csat-stars { display: flex; justify-content: center; gap: 6px; margin-bottom: 16px; }
  .csat-star {
    font-size: 36px; cursor: pointer; color: #ddd; transition: color 0.15s, transform 0.15s;
    user-select: none; line-height: 1;
  }
  .csat-star.active { color: #f5a623; }
  .csat-star:hover { transform: scale(1.15); }
  .csat-feedback-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 13px; outline: none; resize: vertical; min-height: 60px; max-height: 120px;
    font-family: inherit; margin-bottom: 14px; transition: border-color 0.2s;
  }
  .csat-feedback-input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(74,144,217,0.1); }
  .csat-actions { display: flex; gap: 10px; justify-content: center; }
  .csat-btn {
    padding: 8px 24px; border-radius: 8px; font-size: 14px; font-weight: 500;
    cursor: pointer; border: none; transition: opacity 0.2s;
  }
  .csat-btn:hover { opacity: 0.85; }
  .csat-btn.primary { background: var(--primary); color: #fff; }
  .csat-btn.ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .csat-thanks { font-size: 14px; color: var(--success); padding: 12px 0; }
  .csat-thanks .icon { font-size: 32px; display: block; margin-bottom: 8px; }

  /* ── Generative UI：物流追踪卡片 ── */
  .logistics-card {
    margin-top: 14px; border: 1px solid var(--border); border-radius: 12px;
    background: #fafbfc; overflow: hidden; animation: fadeIn 0.3s ease-out;
  }
  .logistics-card .lc-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 12px; border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #f0f4ff, #fafbfc);
  }
  .logistics-card .lc-carrier {
    display: flex; align-items: center; gap: 8px; font-weight: 600;
    font-size: 14px; color: var(--text);
  }
  .logistics-card .lc-carrier .carrier-icon { font-size: 22px; }
  .logistics-card .lc-tracking-no {
    font-size: 11px; color: var(--text-muted); font-family: monospace;
  }
  .logistics-card .lc-timeline {
    padding: 6px 18px 14px; position: relative;
  }
  .logistics-card .lc-event {
    display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
    position: relative; font-size: 13px;
  }
  .logistics-card .lc-event .lc-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #c0c0c0;
    flex-shrink: 0; margin-top: 3px; position: relative; z-index: 1;
    transition: background 0.3s;
  }
  .logistics-card .lc-event.current .lc-dot {
    background: var(--primary); box-shadow: 0 0 0 4px rgba(74,144,217,0.2);
  }
  .logistics-card .lc-event .lc-line {
    position: absolute; left: 22px; top: 22px; bottom: -6px;
    width: 2px; background: #e8e8e8; z-index: 0;
  }
  .logistics-card .lc-event:last-child .lc-line { display: none; }
  .logistics-card .lc-event .lc-info { flex: 1; min-width: 0; }
  .logistics-card .lc-event .lc-time {
    font-size: 11px; color: var(--text-muted); margin-bottom: 2px;
  }
  .logistics-card .lc-event .lc-desc {
    font-size: 13px; color: var(--text); line-height: 1.4;
  }
  .logistics-card .lc-event.current .lc-desc {
    font-weight: 600; color: var(--primary);
  }
  .logistics-card .lc-event .lc-location {
    font-size: 11px; color: var(--text-muted);
  }
  .logistics-card .lc-footer {
    padding: 10px 18px; border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    background: #fff;
  }
  .logistics-card .lc-footer .lc-est-label { color: var(--text-muted); }
  .logistics-card .lc-footer .lc-est-value { color: var(--primary); font-weight: 600; }

</style>
</head>
<body>

<!-- 顶部标题栏 -->
<div class="header">
  <div>
    <h1>多 Agent 客服分流系统</h1>
    <div class="subtitle">LangGraph + FastAPI + MCP 协议 | 9 节点状态图 · 5 层安全 · 语义知识库</div>
  </div>
  <div class="header-right">
    <select id="userSelect" title="选择模拟用户身份"
            style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--card-bg);color:var(--text);cursor:pointer;max-width:140px;">
      <option value="">匿名用户</option>
      <option value="CU0001">CU0001 张伟 (金卡)</option>
      <option value="CU0002">CU0002 王芳</option>
      <option value="CU0003">CU0003 李明 (金卡)</option>
      <option value="CU0005">CU0005 刘洋</option>
      <option value="CU0010">CU0010 王磊</option>
      <option value="CU0015">CU0015 胡波</option>
      <option value="CU0020">CU0020 林小婉</option>
      <option value="custom">✏ 自定义…</option>
    </select>
    <input id="customUserId" type="text" placeholder="输入用户ID…"
           style="display:none;padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;width:120px;"
           onblur="if(!this.value){ document.getElementById('userSelect').value=''; toggleCustomUser(); }">
    <span class="tech-badge" title="Model Context Protocol: 工具通过 MCP 标准协议暴露">MCP</span>
    <span class="tech-badge" title="Qdrant 向量语义检索知识库">向量知识库</span>
    <label class="stream-toggle">
      <input type="checkbox" id="streamToggle" checked> SSE 流式
    </label>
    <span class="badge badge-ready" id="statusBadge">就绪</span>
  </div>
</div>

<div class="main">
  <!-- 左侧：对话区 -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state" id="emptyState">
        <div class="icon">&#x1F916;</div>
        <p>你好！我是智能客服助手</p>
        <p class="hints">试试问我：</p>
        <div id="hintChips">
          <span class="hint-chip" onclick="sendHint(this.textContent)">我的电脑蓝屏了怎么办</span>
          <span class="hint-chip" onclick="sendHint(this.textContent)">查一下订单ORD00001</span>
          <span class="hint-chip" onclick="sendHint(this.textContent)">我要退款</span>
          <span class="hint-chip" onclick="sendHint(this.textContent)">我的快递到哪了？运单号SF1234567890</span>
          <span class="hint-chip" onclick="sendHint(this.textContent)">退货政策是什么</span>
        </div>
      </div>
    </div>
    <!-- 输入栏 -->
    <div class="input-bar">
      <input id="input" type="text" placeholder="输入你的问题…" autofocus
             onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send();}">
      <button id="sendBtn" onclick="send()">发送</button>
    </div>
  </div>

  <!-- 右侧：Agent 执行追踪面板 -->
  <div class="trace-panel" id="tracePanel">
    <div class="trace-header">
      <span style="font-size:18px">&#x1F50D;</span> Agent 执行追踪
    </div>
    <div class="trace-list" id="traceList">
      <div class="trace-placeholder" style="color:#bbb;text-align:center;padding:40px 12px;font-size:13px;">
        Agent 各节点执行步骤<br>将在此实时展示
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  配置
// ═══════════════════════════════════════════════════════════
const API = '/api/v1/agent';

// 会话管理：从 localStorage 读取或新建
let sessionId = localStorage.getItem('agent_session') || '';
if (!sessionId) { sessionId = crypto.randomUUID().replace(/-/g, '').slice(0,12); localStorage.setItem('agent_session', sessionId); }

let isLoading = false;
const activeNodes = new Map(); // nodeName → { el, detailEl }

// ── 用户身份管理 ──────────────────────────────────────
const userSelect = document.getElementById('userSelect');
const customUserId = document.getElementById('customUserId');

// 恢复上次选择的用户身份
const savedUserId = localStorage.getItem('agent_user_id') || '';
const savedCustomId = localStorage.getItem('agent_custom_user_id') || '';
if (savedCustomId) {
  userSelect.value = 'custom';
  customUserId.style.display = 'inline-block';
  customUserId.value = savedCustomId;
} else if (savedUserId) {
  // 检查是否是已知选项
  const option = userSelect.querySelector(`option[value="${savedUserId}"]`);
  if (option) {
    userSelect.value = savedUserId;
  } else {
    userSelect.value = 'custom';
    customUserId.style.display = 'inline-block';
    customUserId.value = savedUserId;
  }
}

function toggleCustomUser() {
  if (userSelect.value === 'custom') {
    customUserId.style.display = 'inline-block';
    customUserId.focus();
  } else {
    customUserId.style.display = 'none';
    customUserId.value = '';
    // 保存选择
    localStorage.setItem('agent_user_id', userSelect.value);
    localStorage.removeItem('agent_custom_user_id');
  }
}
// 监听 select 变化
userSelect.addEventListener('change', toggleCustomUser);
// 自定义输入框失焦时保存
customUserId.addEventListener('blur', function() {
  if (this.value.trim()) {
    localStorage.setItem('agent_custom_user_id', this.value.trim());
    localStorage.setItem('agent_user_id', this.value.trim());
  }
});

function getUserId() {
  if (userSelect.value === 'custom') {
    const val = customUserId.value.trim();
    if (val) {
      localStorage.setItem('agent_custom_user_id', val);
      localStorage.setItem('agent_user_id', val);
    }
    return val;
  }
  localStorage.setItem('agent_user_id', userSelect.value);
  localStorage.removeItem('agent_custom_user_id');
  return userSelect.value;  // CUxxxx 或空字符串（匿名）
}

// 意图中文映射
const intentMap = {
  tech_support: {cls:'intent-tech', label:'技术支持'},
  finance: {cls:'intent-finance', label:'财务'},
  after_sale: {cls:'intent-aftersale', label:'售后'},
};

// 情感中文映射
const sentimentMap = {
  positive:   {cls:'sentiment-positive',   label:'😊 满意',   icon:'😊'},
  neutral:    {cls:'sentiment-neutral',    label:'中性',       icon:'😐'},
  anxious:    {cls:'sentiment-anxious',    label:'😰 焦虑',   icon:'😰'},
  angry:      {cls:'sentiment-angry',      label:'😡 愤怒',   icon:'😡'},
  frustrated: {cls:'sentiment-frustrated', label:'😞 沮丧',   icon:'😞'},
};

// ═══════════════════════════════════════════════════════════
//  DOM 引用
// ═══════════════════════════════════════════════════════════
const chatMessages = document.getElementById('chatMessages');
const emptyState = document.getElementById('emptyState');
const traceList = document.getElementById('traceList');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusBadge = document.getElementById('statusBadge');
const streamToggle = document.getElementById('streamToggle');

// ═══════════════════════════════════════════════════════════
//  工具函数
// ═══════════════════════════════════════════════════════════
function clearEmpty() { if (emptyState) emptyState.remove(); }
function scrollChat() { chatMessages.scrollTop = chatMessages.scrollHeight; }
function scrollTrace() { traceList.scrollTop = traceList.scrollHeight; }
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// 快捷问题
function sendHint(text) {
  if (isLoading) return;
  inputEl.value = text;
  send();
}

// ═══════════════════════════════════════════════════════════
//  消息渲染
// ═══════════════════════════════════════════════════════════
function renderUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="avatar">我</div><div class="bubble">${escapeHtml(text)}</div>`;
  chatMessages.appendChild(div);
}

function renderAgentBubble(id) {
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = id;
  div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><span class="stream-text"></span><span class="stream-cursor"></span></div>`;
  chatMessages.appendChild(div);
  return div.querySelector('.stream-text');
}

function finishAgentBubble(bubbleId) {
  const msg = document.getElementById(bubbleId);
  if (!msg) return;
  const cursor = msg.querySelector('.stream-cursor');
  if (cursor) cursor.remove();
}

// ═══════════════════════════════════════════════════════════
//  Agent 追踪面板
// ═══════════════════════════════════════════════════════════
function clearTracePlaceholder() {
  const ph = traceList.querySelector('.trace-placeholder');
  if (ph) ph.remove();
}

function getOrCreateTraceNode(nodeName, label, icon) {
  if (activeNodes.has(nodeName)) return activeNodes.get(nodeName);

  clearTracePlaceholder();

  // 图标映射（中文 icon key → emoji）
  const iconMap = {
    brain: '\u{1F9E0}', search: '\u{1F50D}', wrench: '\u{1F527}',
    dollar: '\u{1F4B0}', package: '\u{1F4E6}', shield: '\u{1F6E1}',
    warning: '\u{26A0}', user: '\u{1F464}', message: '\u{1F4AC}',
    gear: '⚙',
  };
  const iconChar = iconMap[icon] || '⚙';

  const div = document.createElement('div');
  div.className = 'trace-node active';
  div.setAttribute('data-node', nodeName);
  div.innerHTML = `
    <div class="trace-node-header">
      <span class="trace-icon">${iconChar}</span>
      <span>${escapeHtml(label)}</span>
      <span class="trace-status running">执行中…</span>
    </div>
    <div class="trace-detail"></div>`;

  traceList.appendChild(div);
  scrollTrace();

  const obj = { el: div, detailEl: div.querySelector('.trace-detail') };
  activeNodes.set(nodeName, obj);
  return obj;
}

function markNodeDone(nodeName) {
  const obj = activeNodes.get(nodeName);
  if (!obj) return;
  obj.el.classList.remove('active');
  obj.el.classList.add('done');
  const status = obj.el.querySelector('.trace-status');
  if (status) { status.textContent = '完成'; status.className = 'trace-status done'; }
  scrollTrace();
}

function updateNodeDetail(nodeName, html) {
  const obj = activeNodes.get(nodeName);
  if (!obj) return;
  obj.detailEl.innerHTML = html;
  scrollTrace();
}

// ═══════════════════════════════════════════════════════════
//  发送消息
// ═══════════════════════════════════════════════════════════
async function send() {
  const message = inputEl.value.trim();
  if (!message || isLoading) return;
  inputEl.value = '';
  inputEl.disabled = true;
  sendBtn.disabled = true;
  isLoading = true;
  statusBadge.textContent = '处理中…';
  statusBadge.className = 'badge badge-busy';

  clearEmpty();
  activeNodes.clear();
  traceList.innerHTML = '';  // 清空上一轮的追踪面板

  renderUserMessage(message);
  scrollChat();

  const useStream = streamToggle.checked;
  if (useStream) {
    await sendStream(message);
  } else {
    await sendSync(message);
  }

  isLoading = false;
  inputEl.disabled = false;
  sendBtn.disabled = false;
  statusBadge.textContent = '就绪';
  statusBadge.className = 'badge badge-ready';
  inputEl.focus();
}

// ═══════════════════════════════════════════════════════════
//  同步模式
// ═══════════════════════════════════════════════════════════
async function sendSync(message) {
  try {
    const res = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, session_id: sessionId, user_id: getUserId()}),
    });
    const data = await res.json();
    const bubbleId = 'bubble-' + Date.now();
    const textSpan = renderAgentBubble(bubbleId);

    if (data.reply) {
      // 意图标签
      if (data.intent && data.intent !== 'unknown' && data.intent !== 'blocked') {
        const im = intentMap[data.intent] || {cls:'', label:data.intent};
        const tag = document.createElement('span');
        tag.className = `intent-tag ${im.cls}`;
        tag.textContent = im.label;
        textSpan.parentElement.insertBefore(tag, textSpan);
      }
      // 情感标签
      if (data.sentiment && data.sentiment !== 'neutral') {
        const sm = sentimentMap[data.sentiment] || {cls:'', label:data.sentiment};
        const stag = document.createElement('span');
        stag.className = `sentiment-tag ${sm.cls}`;
        stag.textContent = sm.label;
        textSpan.parentElement.insertBefore(stag, textSpan);
      }
      textSpan.appendChild(document.createTextNode(data.reply));
    } else {
      textSpan.textContent = '处理失败，请重试';
      textSpan.style.color = 'var(--danger)';
    }

    // 右侧追踪面板：显示执行路径
    if (data.agent_path && data.agent_path.length > 0) {
      const labels = {
        classify_intent:'意图识别', extract_context:'上下文提取',
        tech_support_process:'技术支持', finance_process:'财务处理',
        after_sale_process:'售后处理', quality_check:'质检评估',
        escalation_process:'升级处理', compile_result:'汇总回复'
      };
      data.agent_path.forEach(n => {
        getOrCreateTraceNode(n, labels[n]||n, 'gear');
        markNodeDone(n);
      });
    }
    // 检查是否触发了升级转人工
    const syncReply = data.reply || '';
    const ticketMatch2 = syncReply.match(/apr_[a-f0-9]{12}/);
    if (ticketMatch2) { pollHumanReply(bubbleId, 0); }

    // ── Generative UI 动态组件 ──
    if (data.ui_component && data.ui_component.type) {
      renderComponent(data.ui_component, textSpan.parentElement);
    }

    // ── 检测 CSAT 就绪 ──
    if (data.csat_ready) {
      showCSAT();
    }

    finishAgentBubble(bubbleId);
  } catch (e) {
    const bubbleId = 'bubble-' + Date.now();
    const textSpan = renderAgentBubble(bubbleId);
    textSpan.textContent = '网络错误: ' + e.message;
    textSpan.style.color = 'var(--danger)';
    finishAgentBubble(bubbleId);
  }
  scrollChat();
}

// ═══════════════════════════════════════════════════════════
//  SSE 流式模式
// ═══════════════════════════════════════════════════════════
async function sendStream(message) {
  const bubbleId = 'bubble-' + Date.now();
  const textSpan = renderAgentBubble(bubbleId);
  let finalReply = '';
  let csatPending = false;  // 等打字机播完后再弹出 CSAT
  let uiComponent = null;   // 动态 UI 组件

  try {
    const res = await fetch(`${API}/chat/stream`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message, session_id: sessionId, user_id: getUserId()}),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let lastEventType = '';  // 记录当前 SSE event 类型

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        // 记录 SSE 事件类型
        if (line.startsWith('event: ')) {
          lastEventType = line.slice(7).trim();
          continue;
        }
        if (!line.startsWith('data: ')) continue;

        let eventData;
        try {
          eventData = JSON.parse(line.slice(6));
        } catch(e) { continue; }

        // 根据 SSE event 类型（不是 JSON 内的字段）分发处理
        switch (lastEventType) {

          case 'node_start': {
            const {node, label, icon} = eventData;
            getOrCreateTraceNode(node, label, icon);
            break;
          }

          case 'node_progress': {
            const {node, data} = eventData;
            let detailHtml = '';

            // 意图识别结果
            if (data.intent) {
              const im = intentMap[data.intent] || {cls:'',label:data.intent};
              detailHtml += `<span class="intent-tag ${im.cls}" style="font-size:10px">${im.label}</span>`;
              if (data.confidence) {
                detailHtml += ` 置信度: ${(data.confidence*100).toFixed(0)}%`;
              }
            }

            // 情感识别结果
            if (data.sentiment) {
              const sm = sentimentMap[data.sentiment] || {cls:'',label:data.sentiment};
              detailHtml += ` <span class="sentiment-tag ${sm.cls}" style="font-size:10px">${sm.label}</span>`;
            }

            // 槽位填充
            if (data.slots && data.slots.length > 0) {
              detailHtml += `提取: ${data.slots.map(s => typeof s === 'string' ? s : s.name || s.key || '?').join(', ')}`;
            }

            // 工具调用详情
            if (data.tool_calls && data.tool_calls.length > 0) {
              data.tool_calls.forEach(tc => {
                const argsStr = tc.args ? JSON.stringify(tc.args).slice(0, 100) : '';
                let resultStr = '';
                if (tc.result) {
                  if (typeof tc.result === 'string') {
                    resultStr = tc.result.slice(0, 150);
                  } else if (typeof tc.result === 'object') {
                    resultStr = JSON.stringify(tc.result).slice(0, 150);
                  }
                }
                detailHtml += `<div class="tool-call">
                  <span class="tool-name">调用: ${escapeHtml(tc.name)}</span>
                  ${argsStr ? `<span class="tool-args">(${escapeHtml(argsStr)})</span>` : ''}
                  ${resultStr ? `<span class="tool-result">返回: ${escapeHtml(resultStr)}</span>` : ''}
                </div>`;
              });
            }

            // 质检评分
            if (data.quality_score !== undefined) {
              const cls = data.passed ? 'pass' : 'fail';
              const label = data.passed ? '通过' : '未通过(需升级)';
              detailHtml += `评分: <span class="score ${cls}">${data.quality_score.toFixed(2)} ${label}</span>`;
            }

            // 升级原因
            if (data.reason) {
              detailHtml += `<br>原因: ${escapeHtml(data.reason)}`;
            }

            updateNodeDetail(node, detailHtml);
            break;
          }

          case 'node_done': {
            const {node} = eventData;
            markNodeDone(node);
            break;
          }

          case 'reply_chunk': {
            // 接收完整回复文本，启动打字机动画逐字输出
            const fullText = eventData.text || '';
            if (fullText) {
              finalReply = fullText;  // 保存完整回复用于后续轮询判断
              startTypewriter(textSpan, fullText);
            }
            break;
          }

          case 'done': {
            if (eventData.csat_ready) {
              csatPending = true;  // 延迟到打字机播完后弹出
            }
            if (eventData.ui_component && eventData.ui_component.type) {
              uiComponent = eventData.ui_component;
            }
            break;
          }

          case 'error': {
            stopTypewriter();
            textSpan.textContent = '错误: ' + eventData.message;
            textSpan.style.color = 'var(--danger)';
            break;
          }
        }
      }
    }
  } catch (e) {
    stopTypewriter();
    textSpan.textContent = '连接中断: ' + e.message;
    textSpan.style.color = 'var(--danger)';
  }

  // 等打字机播完再移除光标
  await waitForTypewriter();
  finishAgentBubble(bubbleId);
  scrollChat();

  // ── 打字机播完后才弹出 CSAT（避免打断用户体验）──
  if (csatPending) {
    showCSAT();
    csatPending = false;
  }

  // ── Generative UI 动态组件 ──
  if (uiComponent) {
    renderComponent(uiComponent, textSpan.parentElement);
    uiComponent = null;
  }

  // 如果回复中包含工单编号，说明触发了升级转人工，开始轮询人工回复
  const ticketMatch = finalReply.match(/apr_[a-f0-9]{12}/);
  if (ticketMatch) {
    pollHumanReply(bubbleId, 0);
  }
}

// ═══════════════════════════════════════════════════════════
//  打字机动画引擎
// ═══════════════════════════════════════════════════════════
let typewriterTimer = null;
let typewriterQueue = '';
let typewriterTarget = null;  // 当前打字目标 textSpan

function startTypewriter(textSpan, text) {
  if (!text) return;
  stopTypewriter();
  textSpan.textContent = '';
  typewriterTarget = textSpan;
  // 用 Array.from 正确处理 Unicode（emoji 等双字节字符不会被切碎）
  const chars = Array.from(text);
  // 立即显示前 3 个字符
  const head = chars.slice(0, 3).join('');
  typewriterQueue = chars.slice(3);  // array of real characters
  textSpan.textContent = head;
  scrollChat();
  // 逐字输出
  typewriterTimer = setInterval(() => {
    if (typewriterQueue.length === 0) {
      stopTypewriter();
      return;
    }
    // 取 1 个字符（中/日/emoji 都是 1 个完整字符）
    const ch = typewriterQueue.shift();
    textSpan.textContent += ch;
    scrollChat();
  }, 25);
}

function stopTypewriter() {
  if (typewriterTimer) {
    clearInterval(typewriterTimer);
    typewriterTimer = null;
  }
  typewriterQueue = '';
  typewriterTarget = null;
}

async function waitForTypewriter() {
  const deadline = Date.now() + 30000;
  while (typewriterTimer !== null && Date.now() < deadline) {
    await new Promise(r => setTimeout(r, 50));
  }
}

// ═══════════════════════════════════════════════════════════
//  人工回复轮询（升级工单批准后自动拉取）
// ═══════════════════════════════════════════════════════════
async function pollHumanReply(escalationBubbleId, attempt) {
  if (attempt > 30) return;  // 最多轮询 60 秒

  await new Promise(r => setTimeout(r, 2000));  // 2 秒间隔

  try {
    const resp = await fetch(`${API}/pending?session_id=${sessionId}`);
    const data = await resp.json();
    if (data.has_reply && data.reply) {
      // 人工已回复 → 渲染新消息气泡
      const bubbleId = 'human-reply-' + Date.now();
      const textSpan = renderAgentBubble(bubbleId);
      startTypewriter(textSpan, data.reply);
      await waitForTypewriter();
      finishAgentBubble(bubbleId);
      scrollChat();

      // 隐藏升级气泡中的工单编号提示
      const escMsg = document.getElementById(escalationBubbleId);
      if (escMsg) {
        const status = escMsg.querySelector('.escalation-status');
        if (status) status.remove();
      }
      return;
    }
  } catch (e) {
    // 网络错误，继续轮询
  }

  // 继续下一次轮询
  pollHumanReply(escalationBubbleId, attempt + 1);
}

// ═══════════════════════════════════════════════════════════
//  CSAT 满意度评分
// ═══════════════════════════════════════════════════════════
//  Generative UI — 动态组件渲染
// ═══════════════════════════════════════════════════════════

const COMPONENT_RENDERERS = {
  /** 物流追踪卡片 */
  logistics_tracking_card(data, container) {
    const events = data.events || [];
    const currentIdx = events.length - 1; // 最后一条为当前状态

    const card = document.createElement('div');
    card.className = 'logistics-card';

    // 头部：快递公司 + 运单号
    const carrierEmoji = {顺丰速运:'🚚',京东快递:'📦',EMS:'✉️',圆通速递:'📬',中通快递:'📮',韵达快递:'📨',极兔速递:'🐰'};
    const emoji = carrierEmoji[data.company] || '📋';
    card.innerHTML = `
      <div class="lc-header">
        <div class="lc-carrier">
          <span class="carrier-icon">${emoji}</span>
          <span>${escapeHtml(data.company || '')}</span>
        </div>
        <span class="lc-tracking-no">${escapeHtml(data.tracking_no || '')}</span>
      </div>
      <div class="lc-timeline">
        ${events.map((e, i) => `
          <div class="lc-event${i === currentIdx ? ' current' : ''}">
            <div class="lc-dot"></div>
            ${i < events.length - 1 ? '<div class="lc-line"></div>' : ''}
            <div class="lc-info">
              <div class="lc-time">${escapeHtml(e.timestamp || e.time || '')}</div>
              <div class="lc-desc">${escapeHtml(e.event || '')}</div>
              <div class="lc-location">${escapeHtml(e.location || '')}</div>
            </div>
          </div>
        `).join('')}
      </div>
      ${data.estimated_delivery ? `
      <div class="lc-footer">
        <span class="lc-est-label">📅 预计送达：</span>
        <span class="lc-est-value">${escapeHtml(data.estimated_delivery)}</span>
      </div>` : ''}
    `;
    container.appendChild(card);
  }
};

function renderComponent(component, container) {
  if (!component || !component.type) return;
  const renderer = COMPONENT_RENDERERS[component.type];
  if (renderer) {
    renderer(component.data, container);
  }
}

// ═══════════════════════════════════════════════════════════
let csatVisible = false;
let csatSelected = 0;

function showCSAT() {
  if (csatVisible) return;
  csatVisible = true;

  // 防止同一次对话重复弹出
  const existing = document.querySelector('.csat-overlay');
  if (existing) existing.remove();

  csatSelected = 0;

  const overlay = document.createElement('div');
  overlay.className = 'csat-overlay';
  overlay.innerHTML = `
    <div class="csat-card">
      <div class="csat-title">请为本次服务评分</div>
      <div class="csat-subtitle">您的反馈将帮助我们提升服务质量</div>
      <div class="csat-stars" id="csatStars">
        <span class="csat-star" data-value="1" title="非常不满意">⭐</span>
        <span class="csat-star" data-value="2" title="不满意">⭐</span>
        <span class="csat-star" data-value="3" title="一般">⭐</span>
        <span class="csat-star" data-value="4" title="满意">⭐</span>
        <span class="csat-star" data-value="5" title="非常满意">⭐</span>
      </div>
      <textarea class="csat-feedback-input" id="csatFeedback"
                placeholder="补充您的意见（选填）…"
                maxlength="500"></textarea>
      <div class="csat-actions">
        <button class="csat-btn ghost" onclick="closeCSAT()">跳过</button>
        <button class="csat-btn primary" onclick="submitCSAT()">提交</button>
      </div>
      <div class="csat-error" id="csatError" style="color:var(--danger);font-size:12px;margin-top:8px;display:none;"></div>
    </div>`;

  document.body.appendChild(overlay);

  // ── 星级悬停与点击交互 ──
  const stars = overlay.querySelectorAll('.csat-star');
  stars.forEach(star => {
    star.addEventListener('mouseenter', () => {
      const val = parseInt(star.getAttribute('data-value'));
      highlightStars(val);
    });
    star.addEventListener('click', () => {
      csatSelected = parseInt(star.getAttribute('data-value'));
      highlightStars(csatSelected);
      // 清除错误提示
      const err = document.getElementById('csatError');
      if (err) { err.style.display = 'none'; }
    });
  });

  // 鼠标离开星级区域时恢复已选评分
  const starsContainer = overlay.querySelector('#csatStars');
  starsContainer.addEventListener('mouseleave', () => {
    highlightStars(csatSelected);
  });

  // 点击遮罩关闭
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeCSAT();
  });
}

function highlightStars(count) {
  const stars = document.querySelectorAll('.csat-star');
  stars.forEach(s => {
    const val = parseInt(s.getAttribute('data-value'));
    // 用 inline style 确保颜色切换可靠（避免 CSS 优先级问题）
    s.style.color = val <= count ? '#f5a623' : '#ddd';
    s.style.transform = val <= count ? 'scale(1.1)' : 'scale(1)';
  });
}

function closeCSAT() {
  const overlay = document.querySelector('.csat-overlay');
  if (overlay) overlay.remove();
  csatVisible = false;
}

async function submitCSAT() {
  if (!csatSelected) {
    const err = document.getElementById('csatError');
    if (err) { err.textContent = '请先点击星星选择评分'; err.style.display = 'block'; }
    return;
  }

  const score = csatSelected;
  const feedback = document.getElementById('csatFeedback')?.value || '';

  // 禁用提交按钮防止重复
  const submitBtn = document.querySelector('.csat-btn.primary');
  if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = '提交中…'; }

  try {
    const res = await fetch(`${API}/feedback`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({session_id: sessionId, score, feedback}),
    });
    const data = await res.json();
    if (data.success) {
      showCSATThanks();
    } else {
      const err = document.getElementById('csatError');
      if (err) { err.textContent = data.message || '提交失败'; err.style.display = 'block'; }
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '提交'; }
    }
  } catch (e) {
    const err = document.getElementById('csatError');
    if (err) { err.textContent = '网络错误: ' + e.message; err.style.display = 'block'; }
    if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = '提交'; }
  }
}

function showCSATThanks() {
  const card = document.querySelector('.csat-card');
  if (!card) return;
  card.innerHTML = `
    <div class="csat-thanks">
      <span class="icon">✅</span>
      感谢您的反馈！
    </div>`;
  // 1.5 秒后自动关闭
  setTimeout(closeCSAT, 1500);
}
